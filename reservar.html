<!DOCTYPE html>
<html lang="ca">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="css/style.css" />

        <title>Gym App – Reservar</title>
    </head>
    <body>

        <header class="topbar">
            <a class="topbar__logo" href="index.html">⚡ Gym App</a>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="reservar.html" class="active">Reservar</a>
                <a href="sessions.html">Gestor</a>
            </nav>
        </header>

        <main class="page">

            <h1 class="page-title">Nueva reserva</h1>

            <div class="form-card">
                <form id="reserva-form" novalidate>

                <div class="form-group">
                    <label for="nom-soci">Nombre del socio *</label>
                    <input type="text" id="nom-soci" placeholder="Ex: Maria López" required autocomplete="off"/>
                </div>

                <div class="form-group">
                    <label for="sessio-select">Sesion *</label>
                    <select id="sessio-select" required>
                    <option value="">-- Selecciona una sessió --</option>
                    </select>
                </div>

                <button type="submit" class="btn btn--primary form-btn">Confirmar reserva</button>

                </form>
            </div>

            <p class="color-muted margin-10-top">Consulta las reservas en la <a href="index.html" class="color-accent">pàgina principal</a>.</p>

        </main>
    </body>
</html>
