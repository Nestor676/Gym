<!DOCTYPE html>
<html lang="ca">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="css/style.css" />

        <title>Gym App – Gestor</title>
    </head>
    <body>

        <header class="topbar">
            <a class="topbar__logo" href="index.html">⚡ Gym App</a>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="reservar.html">Reservar</a>
                <a href="sessions.html" class="active">Gestor</a>
            </nav>
        </header>

        <main class="page">

            <h1 class="page-title">Gestor de sesiones</h1>

            <section class="section">

                <p class="section-title">Añadir sesion</p>

                <div class="form-card">

                    <form id="add-sessio-form" novalidate>
                
                        <div class="sessions-box">

                            <div class="form-group">
                                <label for="act-actividad">Actividad *</label>
                                <input type="text" id="act-actividad" placeholder="Ej: Yoga" required />

                            </div>

                            <div class="form-group">

                                <label for="act-dia">Dia *</label>
                                <select id="act-dia" required>
                                    <option value="">-- Dia --</option>
                                    <option>Lunes</option>
                                    <option>Martes</option>
                                    <option>Miercoles</option>
                                    <option>Jueves</option>
                                    <option>Viernes</option>
                                    <option>Sabado</option>
                                    <option>Domingo</option>
                                </select>

                            </div>

                            <div class="form-group">
                                <label for="act-hora">Hora *</label>
                                <input type="time" id="act-hora" required />
                            </div>

                            <div class="form-group">
                                <label for="act-aforo">Aforo maximo *</label>
                                <input type="number" id="act-aforo" min="1" placeholder="Ex: 20" required />
                            </div>

                            <div class="form-group" style="grid-column:1/-1">
                                <label for="act-monitor">Monitor/a *</label>
                                <input type="text" id="act-monitor" placeholder="Ej: Anna García" required />
                            </div>

                        </div>

                        <button type="submit" class="btn btn--primary" class="sessions-btn">+ Añadir sesion</button>

                    </form>
                </div>
            </section>

            <section class="section">
                <p class="section-title">Sesiones registradas</p>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Actividad</th>
                                    <th>Dia</th>
                                    <th>Hora</th>
                                    <th>Monitor/a</th>
                                    <th>Aforo</th>
                                    <th>Accion</th>
                                </tr>
                            </thead>
                            <tbody id="sessions-tbody"></tbody>
                        </table>
                    </div>
            </section>

        </main>

        <script type="module" src="/js/sessions.js"></script>
    </body>
</html>
